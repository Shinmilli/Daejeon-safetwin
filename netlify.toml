# 모노레포 루트를 Base 로 쓰는 경우용 (보통은 client/netlify.toml 사용)
[build]
  base = "client"
  command = "npm run build"
  publish = "client/dist"

[[redirects]]
  from = "/api/*"
  to = "https://daejeon-safetwin.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
