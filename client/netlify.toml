# client/ 를 Base directory 로 쓰는 경우 이 파일이 client/ 에 있어야 함
[build]
  command = "npm run build"
  publish = "dist"

# /api/* → Render 백엔드로 프록시 (브라우저에서는 같은 도메인으로 보임)
[[redirects]]
  from = "/api/*"
  to = "https://daejeon-safetwin.onrender.com/api/:splat"
  status = 200
  force = true

# SPA 라우팅
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
